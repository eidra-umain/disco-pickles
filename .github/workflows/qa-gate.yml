name: QA Gate

on:
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check QA report exists
        run: |
          # Extract task ID from branch name
          TASK_ID=$(echo "${{ github.head_ref }}" | grep -oP 'TASK-\d+' || echo "")
          if [ -z "$TASK_ID" ]; then
            echo "Warning: No task ID found in branch name"
            exit 0
          fi
          if [ ! -f "docs/qa/${TASK_ID}-report.md" ]; then
            echo "Error: QA report missing for ${TASK_ID}"
            exit 1
          fi

      # TODO: Add test runner steps when tech stack is decided
      - name: Run tests
        run: echo "TODO: Configure test runner"
